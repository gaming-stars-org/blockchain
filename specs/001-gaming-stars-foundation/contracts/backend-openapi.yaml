openapi: 3.1.0
info:
  title: Gaming Stars Settlement API
  version: 1.0.0
  description: Canonical backend contract for entry and settlement submission.
servers:
  - url: https://api.example.com
paths:
  /v1/entries/submit:
    post:
      summary: Submit buy_ticket intent
      operationId: submitEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntryRequest'
      responses:
        '200':
          description: Submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponse'
  /v1/settlements/payout:
    post:
      summary: Submit payout settlement
      operationId: submitPayout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayoutRequest'
      responses:
        '200':
          description: Submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponse'
  /v1/settlements/refund:
    post:
      summary: Submit refund settlement
      operationId: submitRefund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '200':
          description: Submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponse'
  /v1/settlements/forfeit:
    post:
      summary: Submit forfeit settlement
      operationId: submitForfeit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForfeitRequest'
      responses:
        '200':
          description: Submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponse'
components:
  schemas:
    EntryMode:
      type: string
      enum: [paid, sponsored]
    ResolutionKind:
      type: string
      enum: [organic, referral, expiry, game_over]
    SettlementKind:
      type: string
      enum: [payout, refund, forfeit]
    TransferLeg:
      type: object
      required: [mint, amount, source_vault, destination_ata]
      properties:
        mint:
          type: string
        amount:
          type: string
          pattern: '^[0-9]+$'
        source_vault:
          type: string
        destination_ata:
          type: string
    EntryRequest:
      type: object
      required:
        - instance_id
        - user
        - entry_mode
        - entry_mint
        - insured
        - entry_total_amount
        - insurance_premium_amount_usdt
        - payer_authority
        - payer_entry_token_account
      properties:
        instance_id:
          type: integer
          format: int64
        user:
          type: string
        entry_mode:
          $ref: '#/components/schemas/EntryMode'
        entry_mint:
          type: string
        insured:
          type: boolean
          description: >
            If true, backend must validate remaining insured capacity and contract
            will reject when instance insured cap is reached.
        entry_total_amount:
          type: string
          pattern: '^[0-9]+$'
        insurance_premium_amount_usdt:
          type: string
          pattern: '^[0-9]+$'
        payer_authority:
          type: string
        payer_entry_token_account:
          type: string
        external_ref:
          type: string
          description: Optional 32-byte correlation key encoded as hex.
    PayoutRequest:
      type: object
      required:
        - settlement_id
        - instance_id
        - ticket_id
        - kind
        - beneficiary
        - resolution_kind
        - legs
      properties:
        settlement_id:
          type: string
        instance_id:
          type: integer
          format: int64
        ticket_id:
          type: integer
          format: int64
        kind:
          type: string
          enum: [payout]
        beneficiary:
          type: string
        resolution_kind:
          type: string
          enum: [organic, referral]
        legs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TransferLeg'
        payload_hash:
          type: string
    RefundRequest:
      type: object
      required:
        - settlement_id
        - instance_id
        - ticket_id
        - kind
        - beneficiary
        - mint
        - amount
        - source_vault
      properties:
        settlement_id:
          type: string
        instance_id:
          type: integer
          format: int64
        ticket_id:
          type: integer
          format: int64
        kind:
          type: string
          enum: [refund]
        beneficiary:
          type: string
        mint:
          type: string
          description: Must be USDT mint.
        amount:
          type: string
          pattern: '^[0-9]+$'
        source_vault:
          type: string
        payload_hash:
          type: string
    ForfeitRequest:
      type: object
      required:
        - settlement_id
        - instance_id
        - ticket_id
        - kind
        - resolution_kind
        - legs
      properties:
        settlement_id:
          type: string
        instance_id:
          type: integer
          format: int64
        ticket_id:
          type: integer
          format: int64
        kind:
          type: string
          enum: [forfeit]
        resolution_kind:
          type: string
          enum: [expiry, game_over]
        legs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TransferLeg'
        payload_hash:
          type: string
    SubmitResponse:
      type: object
      required: [status, tx_signature, submitted_at]
      properties:
        status:
          type: string
          enum: [submitted]
        tx_signature:
          type: string
        settlement_id:
          type: string
        submitted_at:
          type: string
          format: date-time
